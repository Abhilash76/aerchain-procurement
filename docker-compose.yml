services:
  backend:
    image: ${IMAGE_NAMESPACE:-local}/aerchain-backend:${IMAGE_TAG:-latest}
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      MODEL_NAME: "kimi-k2.5:cloud"
      OLLAMA_MODEL: "kimi-k2.5:cloud"
    ports:
      - "8765:8765"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: ${IMAGE_NAMESPACE:-local}/aerchain-frontend:${IMAGE_TAG:-latest}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

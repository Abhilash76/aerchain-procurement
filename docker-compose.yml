services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "8765:8765"
    depends_on:
      - ollama

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_ANALYSIS_SERVER: /api/analysis
        VITE_OLLAMA_CHAT_URL: /api/ollama/api/chat
    ports:
      - "8080:80"
    depends_on:
      - backend
      - ollama

volumes:
  ollama_data:

version: '3.8'

services:
  scripts_service:
    build: 
      context: ./scripts
    container_name: aerchain-scripts
    ports:
      - "8765:8765"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 10s
      retries: 5
    restart: always

  src_service:
    build:
      context: ./src
    container_name: aerchain-ui
    ports:
      - "80:80"
    depends_on:
      scripts_service:
        condition: service_healthy
    restart: always

networks:
  default:
    name: aerchain-network